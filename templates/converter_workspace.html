{% extends "base.html" %}

{% block content %}

<div class="workspace">

  <h1>{{ tool }}</h1>

  <p>Uploaded File:</p>

  <h3>{{ filename }}</h3>

  <form action="/convert/{{ tool }}"
        method="POST">

    <input type="hidden"
           name="filename"
           value="{{ filename }}">

    <button type="submit">
      Convert File
    </button>

  </form>

</div>

{% endblock %}
